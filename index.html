<!DOCTYPE html>
<html lang="zh-TW" data-lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title data-zh="3市場股票儀表板" data-en="3-Market Stock Dashboard">3市場股票儀表板</title>
<meta name="description" content="Taiwan, US, and Japan stock watchlist dashboard with technical analysis and market signals.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#22272E;--card:#2D333B;--card2:#353C47;--surface-3:#3D4550;--surface-elevated:#323940;
  --border:#444C56;--border-default:#505962;--border-hover:#636E7B;--divider:#3D4550;
  --text:#DADEE6;--muted:#8B949E;--text-tertiary:#6E7A86;
  --blue:#6C72FF;--teal:#3DD6C8;--purple:#6C72FF;--forest:#3DD6C8;
  --accent-muted:rgba(108,114,255,0.15);--teal-muted:rgba(61,214,200,0.12);
  --green:#2DD57A;--red:#F5475B;--yellow:#FFAA2B;--orange:#FFAA2B;--info:#4DA3FF;
  --green-muted:rgba(45,213,122,0.15);--red-muted:rgba(245,71,91,0.12);--yellow-muted:rgba(255,170,43,0.12);
  --gradient-brand:linear-gradient(135deg,#6C72FF 0%,#3DD6C8 100%);
  --gradient-surface:linear-gradient(180deg,#22272E 0%,#282E36 100%);
  --radius-sm:6px;--radius-md:12px;--radius-lg:16px;--radius-xl:24px;
  --transition-fast:0.15s ease;--transition-normal:0.2s ease;
  --font-primary:'Inter','Noto Sans TC',-apple-system,'SF Pro Display','Segoe UI',sans-serif;
  --font-mono:'JetBrains Mono','SF Mono','Menlo',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-primary);min-height:100vh;-webkit-font-smoothing:antialiased}
@keyframes fadeInUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes spin{to{transform:rotate(360deg)}}

/* WSJ Digest */
.wsj-digest{background:var(--card);border-bottom:1px solid var(--border);padding:0.7rem 2rem}
.wsj-digest-title{font-size:0.95rem;font-weight:700;color:var(--text);margin-bottom:0.45rem;display:flex;align-items:center;gap:0.4rem}
.wsj-digest-title span{color:var(--yellow)}
.wsj-digest-list{display:flex;flex-direction:column;gap:0.3rem}
.wsj-digest-item{font-size:0.82rem;line-height:1.4;display:flex;align-items:baseline;gap:0.4rem}
.wsj-digest-item::before{content:'·';color:var(--yellow);font-weight:700;flex-shrink:0}
.wsj-digest-item a{color:var(--text);text-decoration:none;transition:color var(--transition-fast)}
.wsj-digest-item a:hover{color:var(--teal);text-decoration:underline}
.wsj-digest-empty{font-size:0.8rem;color:var(--muted)}
@media(max-width:768px){.wsj-digest{padding:0.6rem 1rem}}

/* Global Ticker Bar */
#global-ticker{background:var(--card);border-bottom:1px solid var(--border);padding:0.4rem 2rem;display:flex;align-items:center;gap:1.2rem;flex-wrap:wrap;font-size:0.78rem;position:sticky;top:0;z-index:200;}
.ticker-item{display:flex;align-items:center;gap:0.3rem;white-space:nowrap}
.ticker-item a{color:var(--teal);text-decoration:none;display:flex;align-items:center;gap:0.3rem}
.ticker-item a:hover{color:var(--text);text-decoration:underline}
.ticker-up{color:var(--green)}
.ticker-dn{color:var(--red)}

/* Header */
header{background:var(--gradient-surface);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:40px;z-index:150;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.header-left{display:flex;align-items:center;gap:1rem}
.logo{font-size:1.5rem}
.header-title{font-size:1.15rem;font-weight:700}
.market-tabs{display:flex;gap:0.5rem;margin-left:2rem}
.market-tab{padding:0.4rem 1rem;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;border-radius:var(--radius-sm);font-size:0.85rem;font-weight:600;transition:all var(--transition-normal)}
.market-tab:hover{border-color:var(--border-hover);color:var(--text)}
.market-tab.active{border-color:var(--text);color:var(--text);font-weight:700}
.market-tab.active[data-market="tw"]{border-color:var(--blue);color:var(--blue)}
.market-tab.active[data-market="us"]{border-color:var(--red);color:var(--red)}
.market-tab.active[data-market="jp"]{border-color:var(--yellow);color:var(--yellow)}
.header-right{display:flex;align-items:center;gap:1rem;margin-left:auto}
.live-badge{display:flex;align-items:center;gap:0.4rem;background:var(--green-muted);border:1px solid rgba(45,213,122,0.25);padding:0.2rem 0.65rem;border-radius:var(--radius-xl);font-size:0.75rem;color:var(--green)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px rgba(45,213,122,0.6);animation:pulse 2s infinite}
.lang-toggle{display:flex;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.lang-btn{padding:0.3rem 0.75rem;font-size:0.8rem;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all var(--transition-fast);font-family:inherit}
.lang-btn.active{background:var(--blue);color:#fff}
.lang-btn:hover:not(.active){color:var(--text)}

/* KPI Row */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;padding:1.3rem 2rem}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:1.15rem 1.4rem;transition:border-color var(--transition-normal);animation:fadeInUp 0.3s ease both}
.kpi:hover{border-color:var(--border-hover);background:var(--card2)}
.kpi-icon{font-size:1.25rem;margin-bottom:0.3rem}
.kpi-label{color:var(--text-tertiary);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.04em;font-weight:500;margin-bottom:0.2rem}
.kpi-value{font-size:2rem;font-weight:800;line-height:1.1;font-variant-numeric:tabular-nums}
.kpi-sub{color:var(--muted);font-size:0.72rem;margin-top:0.25rem}

/* Watchlist Section */
.watchlist-section{padding:1rem 2rem 1rem}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem}
.section-badge{display:inline-flex;align-items:center;gap:0.4rem;padding:0.22rem 0.8rem;border-radius:var(--radius-xl);font-size:0.8rem;font-weight:600;border:1px solid;}
.section-badge-tw{background:rgba(108,114,255,0.12);border-color:rgba(108,114,255,0.28);color:var(--blue)}
.section-badge-us{background:rgba(245,71,91,0.12);border-color:rgba(245,71,91,0.28);color:var(--red)}
.section-badge-jp{background:rgba(255,170,43,0.12);border-color:rgba(255,170,43,0.28);color:var(--yellow)}
.group-filter{display:flex;gap:0.5rem;margin-bottom:1rem;flex-wrap:wrap}
.filter-chip{padding:0.35rem 0.8rem;border-radius:var(--radius-xl);border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:0.8rem;font-weight:500;transition:all var(--transition-normal)}
.filter-chip:hover{border-color:var(--text)}
.filter-chip.active{background:var(--blue);border-color:var(--blue);color:#fff}
.stock-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.stock-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:1rem;transition:border-color var(--transition-normal),background var(--transition-normal);animation:fadeInUp 0.3s ease both;cursor:pointer}
.stock-card:hover{border-color:var(--border-hover);background:var(--card2)}
.stock-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.75rem}
.stock-symbol{font-weight:700;font-size:0.95rem;font-family:var(--font-mono)}
.stock-symbol-tw{color:var(--blue)}
.stock-symbol-us{color:var(--red)}
.stock-symbol-jp{color:var(--yellow)}
.stock-name{font-size:0.8rem;color:var(--muted);margin-bottom:0.2rem}
.stock-group-tag{display:inline-block;font-size:0.65rem;padding:0.15rem 0.4rem;background:var(--card2);border:1px solid var(--border);border-radius:4px;color:var(--text-tertiary);margin-bottom:0.5rem}
.score-badge{padding:0.15rem 0.55rem;border-radius:8px;font-size:0.75rem;font-weight:700;text-align:center;width:2.2rem}
.score-a{background:rgba(45,213,122,0.15);color:var(--green)}
.score-b{background:rgba(61,214,200,0.12);color:var(--teal)}
.score-c{background:rgba(255,170,43,0.12);color:var(--yellow)}
.score-d{background:rgba(248,81,73,0.12);color:var(--red)}
.stock-summary{font-size:0.75rem;color:var(--muted);margin-bottom:0.75rem;line-height:1.4}
.stock-meta{display:flex;gap:0.75rem;flex-wrap:wrap;font-size:0.75rem;color:var(--text-tertiary)}
.stock-meta-item{display:flex;align-items:center;gap:0.25rem}
.stock-meta-label{color:var(--muted)}
.stock-meta-value{color:var(--text);font-weight:600}
.stock-meta-up{color:var(--green)}
.stock-meta-dn{color:var(--red)}
.stock-sparkline{height:48px;margin:0.5rem 0;border-radius:4px;overflow:hidden}
.stock-sparkline canvas{width:100%;height:100%;display:block}
.stock-price-row{display:flex;align-items:baseline;gap:0.5rem;margin-bottom:0.3rem}
.stock-price{font-size:1.1rem;font-weight:700;font-variant-numeric:tabular-nums}
.stock-change{font-size:0.78rem;font-weight:600}
.stock-vol{font-size:0.7rem;color:var(--text-tertiary)}
.stock-card-expanded{display:none}
.stock-card.expanded .stock-card-summary{display:none}
.stock-card.expanded .stock-card-expanded{display:block}

/* Screener Section */
.screener-section{padding:0 2rem 1rem}
.screener-section[data-market="us"],.screener-section[data-market="jp"]{display:none}
.screener-table{width:100%;border-collapse:collapse;font-size:0.82rem}
.screener-table th{color:var(--text-tertiary);font-weight:500;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.05em;padding:0.5rem 0.6rem;border-bottom:1px solid var(--border-default);text-align:left}
.screener-table td{padding:0.5rem 0.6rem;border-bottom:1px solid var(--border);color:var(--text)}
.screener-table tr:hover td{background:var(--card2)}
.tag{display:inline-block;padding:0.1rem 0.4rem;border-radius:4px;font-size:0.7rem;font-weight:600;margin-right:0.2rem}
.tag-f{background:var(--green-muted);color:var(--green)}
.tag-t{background:var(--red-muted);color:var(--red)}
.tag-d{background:var(--yellow-muted);color:var(--yellow)}

/* Signals Section */
.signal-section{padding:0 2rem 1rem;margin-bottom:0.5rem}
.signal-section[data-market="us"],.signal-section[data-market="jp"]{display:none}
.signal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.signal-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:1rem 1.2rem;transition:border-color var(--transition-normal);animation:fadeInUp 0.3s ease both}
.signal-card:hover{border-color:var(--border-hover)}
.signal-card-title{font-size:0.85rem;font-weight:700;color:var(--text);margin-bottom:0.75rem;display:flex;align-items:center;gap:0.45rem}
.sig-table{width:100%;border-collapse:collapse;font-size:0.77rem}
.sig-table th{color:var(--text-tertiary);font-weight:500;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.05em;padding:0.3rem 0.4rem;border-bottom:1px solid var(--border-default);text-align:left}
.sig-table td{padding:0.35rem 0.4rem;border-bottom:1px solid var(--border);color:var(--text)}
.sig-table tr:hover td{background:var(--card2)}
.sig-sid{color:var(--blue);font-weight:600;font-family:var(--font-mono)}
.sig-up{color:var(--green)}
.sig-dn{color:var(--red)}
.sig-empty{text-align:center;padding:1.8rem 1rem;color:var(--muted);font-size:0.82rem}

/* Monitor Alerts */
.monitor-section{padding:0 2rem 1rem;margin-bottom:0.5rem}
.monitor-table{width:100%;border-collapse:collapse;font-size:0.82rem}
.monitor-table th{color:var(--text-tertiary);font-weight:500;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.05em;padding:0.5rem 0.6rem;border-bottom:1px solid var(--border-default);text-align:left}
.monitor-table td{padding:0.5rem 0.6rem;border-bottom:1px solid var(--border);color:var(--text)}
.monitor-table tr:hover td{background:var(--card2)}

/* K-line Section */
.kline-section{padding:0 2rem 1rem;margin-bottom:1rem}
.kline-section[data-market="us"],.kline-section[data-market="jp"]{display:none}
.kline-chips{display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:1rem}
.kline-chip{padding:0.28rem 0.65rem;border-radius:var(--radius-sm);font-size:0.75rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text);transition:all var(--transition-normal);white-space:nowrap}
.kline-chip:hover{border-color:var(--blue);color:var(--blue)}
.kline-chip.active{background:var(--accent-muted);border-color:var(--blue);color:var(--blue)}
.kline-chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:0.8rem 1rem}
.kline-chart-title{font-size:0.85rem;font-weight:700;color:var(--text);margin-bottom:0.6rem}
#kline-container{height:380px;width:100%}

/* Responsive */
@media(max-width:1200px){.kpi-row{grid-template-columns:repeat(3,1fr)}.signal-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .stock-grid{grid-template-columns:1fr 1fr}
  .signal-grid{grid-template-columns:1fr}
  .market-tabs{margin-left:auto}
  header{flex-wrap:wrap}
}
@media(max-width:480px){
  .kpi-row{grid-template-columns:1fr}
  .stock-grid{grid-template-columns:1fr}
  #global-ticker{padding:0.4rem 1rem;gap:0.8rem;font-size:0.7rem}
  header{padding:0.8rem 1rem;font-size:0.9rem}
  .market-tabs{margin-left:0;margin-top:0.5rem;flex-basis:100%}
}

/* Market Status Banner */
.market-status{padding:0.8rem 2rem;display:flex;align-items:center;justify-content:center;gap:1rem;border-bottom:1px solid var(--border)}
.market-status-time{font-size:1.3rem;font-weight:700;font-variant-numeric:tabular-nums;font-family:var(--font-mono);color:var(--text)}
.market-status-msg{font-size:0.9rem;color:var(--muted);line-height:1.4}
.market-status.closed{background:rgba(255,170,43,0.08)}
.market-status.pre{background:rgba(108,114,255,0.08)}
.market-status.post{background:rgba(45,213,122,0.08)}

/* Footer */
footer{text-align:center;padding:2rem;color:var(--muted);font-size:0.78rem;border-top:1px solid var(--border)}
footer a{color:var(--blue);text-decoration:none}
footer a:hover{text-decoration:underline}
</style>
</head>
<body>

<!-- WSJ Digest -->
<div class="wsj-digest" id="wsj-digest">
  <div class="wsj-digest-title"><span>📰</span> <span data-zh="華爾街日報讀報摘要" data-en="WSJ Daily Digest">華爾街日報讀報摘要</span></div>
  <div class="wsj-digest-list" id="wsj-digest-list">
    <div class="wsj-digest-empty" data-zh="載入中..." data-en="Loading...">載入中...</div>
  </div>
</div>

<!-- Global Ticker Bar -->
<div id="global-ticker"></div>

<!-- Header with Market Tabs -->
<header>
  <div class="header-left">
    <div class="logo">📊</div>
    <div class="header-title" data-zh="3市場雷達" data-en="3-Market Radar">3市場雷達</div>
  </div>
  <div class="market-tabs">
    <button class="market-tab active" data-market="tw" data-zh="🇹🇼 台股" data-en="🇹🇼 Taiwan">🇹🇼 台股</button>
    <button class="market-tab" data-market="us" data-zh="🇺🇸 美股" data-en="🇺🇸 US">🇺🇸 美股</button>
    <button class="market-tab" data-market="jp" data-zh="🇯🇵 日股" data-en="🇯🇵 Japan">🇯🇵 日股</button>
  </div>
  <div class="header-right">
    <div class="live-badge">
      <span class="live-dot"></span>
      <span data-zh="實時" data-en="Live">實時</span>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('zh',this)">中文</button>
      <button class="lang-btn" onclick="setLang('en',this)">EN</button>
    </div>
  </div>
</header>

<!-- Market Status Banner -->
<div class="market-status" id="market-status">
  <span class="market-status-time" id="status-time"></span>
  <span class="market-status-msg" id="status-msg"></span>
</div>

<!-- KPI Row -->
<div class="kpi-row" id="kpi-row">
  <div class="kpi">
    <div class="kpi-icon">📊</div>
    <div class="kpi-label" data-zh="觀察股數" data-en="Total Stocks">觀察股數</div>
    <div class="kpi-value" id="kpi-total">—</div>
  </div>
  <div class="kpi">
    <div class="kpi-icon">📈</div>
    <div class="kpi-label" data-zh="強勢股" data-en="Strong Stocks">強勢股</div>
    <div class="kpi-value" id="kpi-strong">—</div>
  </div>
  <div class="kpi">
    <div class="kpi-icon">💯</div>
    <div class="kpi-label" data-zh="平均分數" data-en="Avg Score">平均分數</div>
    <div class="kpi-value" id="kpi-score">—</div>
  </div>
  <div class="kpi" id="kpi-4">
    <div class="kpi-icon">🔒</div>
    <div class="kpi-label" data-zh="鎖碼股數" data-en="Lock Count">鎖碼股數</div>
    <div class="kpi-value" id="kpi-lock">—</div>
  </div>
</div>

<!-- Watchlist Section -->
<section class="watchlist-section">
  <div class="section-header">
    <h2 class="section-badge section-badge-tw" id="section-badge" data-zh="💼 觀察清單" data-en="💼 Watchlist">💼 觀察清單</h2>
  </div>
  <div class="group-filter" id="group-filter"></div>
  <div class="stock-grid" id="stock-grid"></div>
</section>

<!-- Screener Section (TW only) -->
<section class="screener-section" data-market="tw">
  <div class="section-header">
    <h2 class="section-badge section-badge-tw" data-zh="📋 營收篩選器" data-en="📋 Screener">📋 營收篩選器</h2>
  </div>
  <table class="screener-table">
    <thead>
      <tr>
        <th data-zh="代號" data-en="Symbol">代號</th>
        <th data-zh="名稱" data-en="Name">名稱</th>
        <th data-zh="營收YoY" data-en="Revenue YoY">營收YoY</th>
        <th data-zh="外資(張)" data-en="Foreign">外資(張)</th>
        <th data-zh="投信(張)" data-en="Trust">投信(張)</th>
        <th data-zh="法人標籤" data-en="Tags">法人標籤</th>
      </tr>
    </thead>
    <tbody id="screener-body">
    </tbody>
  </table>
  <div id="screener-empty" style="text-align:center;padding:2rem;color:var(--muted);display:none">
    <p data-zh="暫無數據" data-en="No data">暫無數據</p>
  </div>
</section>

<!-- Signals Section (TW only) -->
<section class="signal-section" data-market="tw">
  <div class="section-header">
    <h2 class="section-badge section-badge-tw" data-zh="⚡ 三大籌碼訊號" data-en="⚡ Signals">⚡ 三大籌碼訊號</h2>
  </div>
  <div class="signal-grid">
    <div class="signal-card">
      <div class="signal-card-title">
        <span>🔥</span>
        <span data-zh="法人連買" data-en="Inst. Consecutive Buy">法人連買</span>
      </div>
      <table class="sig-table">
        <thead><tr><th data-zh="代號" data-en="Symbol">代號</th><th data-zh="外資" data-en="Foreign">外資</th><th data-zh="投信" data-en="Trust">投信</th></tr></thead>
        <tbody id="sig-consec-buy"></tbody>
      </table>
      <div id="sig-consec-buy-empty" class="sig-empty" style="display:none">
        <p data-zh="暫無數據" data-en="No data">暫無數據</p>
      </div>
    </div>
    <div class="signal-card">
      <div class="signal-card-title">
        <span>📉</span>
        <span data-zh="融資軋空" data-en="Short Squeeze">融資軋空</span>

function renderStockCards(stocks){
  const m = MARKET;
  const html = stocks.map((s,idx)=>{
    const scoreClass = scoreFor(s.score);

    // Price row — all markets

      const change = s.change_pct || 0;

      const changeSign = change > 0 ? '+' : '';

      priceRow = `<div class="stock-price-row">

        </div>
        <div class="stock-card-summary">
          ${priceRow}
          ${sparkline}
          <div class="stock-summary">${s.one_line_summary || '-'}</div>
          <div class="stock-meta">
            ${pe}
            ${s.trade_quality && s.trade_quality!=='no_data'?`<div class="stock-meta-item"><span class="stock-meta-label">Grade:</span><span class="stock-meta-value">${s.trade_quality}</span></div>`:''}
          </div>
        </div>
        <div class="stock-card-expanded" style="display:none">
          <div style="font-size:0.75rem;color:var(--text-tertiary);line-height:1.6">

function formatPrice(p){
  if(p>=1000) return p.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
  if(p>=100) return p.toFixed(1);
  return p.toFixed(2);
}
function formatVol(v){
  if(v>=1e9) return (v/1e9).toFixed(1)+'B';
  if(v>=1e6) return (v/1e6).toFixed(1)+'M';
  if(v>=1e3) return (v/1e3).toFixed(0)+'K';
  return v.toString();
}

function drawSparklines(stocks){
  const m = MARKET;
  stocks.forEach((s,idx)=>{
    if(!s.kbars || !s.kbars.close || s.kbars.close.length < 3) return;
    const canvas = document.getElementById(`spark-${m}-${idx}`);
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const rect = canvas.parentElement.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    const W = rect.width, H = rect.height;
    const closes = s.kbars.close;
    const vols = s.kbars.volume || [];
    const min = Math.min(...closes);
    const max = Math.max(...closes);
    const range = max - min || 1;
    const n = closes.length;
    const step = W / (n - 1);

    // Volume bars (bottom 30%)
    if(vols.length){
      const maxVol = Math.max(...vols) || 1;
      const volH = H * 0.28;
      ctx.globalAlpha = 0.18;
      ctx.fillStyle = '#8B949E';
      vols.forEach((v,i)=>{
        const bh = (v / maxVol) * volH;
        const bw = Math.max(1, step * 0.6);
        ctx.fillRect(i * step - bw/2, H - bh, bw, bh);
      });
      ctx.globalAlpha = 1;
    }

    // Price line
    const isUp = closes[closes.length-1] >= closes[0];
    const lineColor = isUp ? '#2DD57A' : '#F5475B';
    ctx.strokeStyle = lineColor;
    ctx.lineWidth = 1.5;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    closes.forEach((c,i)=>{
      const x = i * step;
      const y = H * 0.05 + (1 - (c - min) / range) * (H * 0.62);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();

    // Gradient fill under line
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, isUp ? 'rgba(45,213,122,0.12)' : 'rgba(245,71,91,0.12)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.lineTo((n-1)*step, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();
  });
}

function toggleCard(card){

  if(s >= 75) return 'score-a';

  return 'score-d';
}

function updateMarketStatus(){
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  const day = now.getDay(); // 0=Sun, 6=Sat
  const timeStr = now.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  const dateStr = now.toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit',weekday:'short'});

  const el = document.getElementById('market-status');
  const timeEl = document.getElementById('status-time');
  const msgEl = document.getElementById('status-msg');
  timeEl.textContent = dateStr + ' ' + timeStr;

  const isWeekend = day === 0 || day === 6;
  const mins = h * 60 + m;
  const marketOpen = 9 * 60;       // 09:00
  const marketClose = 13 * 60 + 30; // 13:30

  el.classList.remove('closed','pre','post');

  if(isWeekend){
    el.classList.add('closed');
    msgEl.textContent = LANG==='zh'
      ? '目前不是股票交易日，本站顯示的資料是上一個交易日的資料'
      : 'Market is closed today. Data shown is from the last trading day.';
  } else if(mins < marketOpen){
    el.classList.add('pre');
    msgEl.textContent = LANG==='zh'
      ? '現在還沒到交易時間，本站顯示的是昨天收盤的資料'
      : 'Market has not opened yet. Data shown is from yesterday\'s close.';
  } else if(mins >= marketClose){
    el.classList.add('post');
    msgEl.textContent = LANG==='zh'
      ? '現在已經過了交易時間，本站顯示的是今天收盤的資料'
      : 'Market has closed. Data shown is from today\'s close.';
  } else {
    msgEl.textContent = LANG==='zh'
      ? '盤中交易時段'
      : 'Market is open';
  }
}

async function loadWSJDigest(){
  try{
    const cb = '?t=' + Date.now();
    const res = await fetch('data/wsj_digest.json' + cb);
    const d = await res.json();
    if(!d || !d.items || d.items.length === 0){
      document.getElementById('wsj-digest-list').innerHTML =
        `<div class="wsj-digest-empty" data-zh="暫無摘要" data-en="No digest available">暫無摘要</div>`;
      return;
    }
    const html = d.items.map(item =>
      `<div class="wsj-digest-item"><a href="${item.url}" target="_blank" rel="noopener">${item.title}</a></div>`
    ).join('');
    document.getElementById('wsj-digest-list').innerHTML = html;
    // Show date if available
    if(d.date){
      const titleEl = document.querySelector('.wsj-digest-title');
      const dateTag = ` <span style="font-size:0.75rem;color:var(--muted);font-weight:400">${d.date}</span>`;
      titleEl.innerHTML = titleEl.innerHTML + dateTag;
    }
  }catch(e){
    document.getElementById('wsj-digest-list').innerHTML =
      `<div class="wsj-digest-empty" data-zh="載入失敗" data-en="Failed to load">載入失敗</div>`;
  }
}

async function init(){
  document.querySelectorAll('.market-tab').forEach(btn=>{
    btn.addEventListener('click',()=>switchMarket(btn.dataset.market));
  });

  updateMarketStatus();
  await loadWSJDigest();
  await loadGlobalTicker();
  await loadData();
  await loadScreener();
  await loadSignals();
  await loadMonitor();
  await loadKline();

  applyLang();
}

init();
setInterval(updateMarketStatus, 1000);
setInterval(loadGlobalTicker, 60000);
setInterval(loadMonitor, 60000);
</script>
